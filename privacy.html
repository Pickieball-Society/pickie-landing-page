document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e.app\" style=\"color: #1488FF; font-weight: 600; text-decoration: none;\">support@pickie.app<\u002Fa>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <footer style=\"border-top: 1px solid rgba(6,27,91,0.08);\">\n    <div style=\"max-width: 1180px; margin: 0 auto; padding: 36px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 18px;\">\n      <div>\n        <div style=\"font-family: 'Sora'; font-weight: 800; font-size: 22px; letter-spacing: -0.04em;\">Pick<span style=\"color:#1488FF;\">i<\u002Fspan>e<\u002Fdiv>\n        <div style=\"font-size: 13px; color: rgba(6,27,91,0.5); margin-top: 4px;\">Find Your Match. Be Pickie.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 26px; font-size: 13px; font-weight: 500;\">\n        <a href=\"index.html\" style=\"color: rgba(6,27,91,0.62); text-decoration: none;\">Home<\u002Fa>\n        <a href=\"terms.html\" style=\"color: rgba(6,27,91,0.62); text-decoration: none;\">Terms<\u002Fa>\n        <a href=\"privacy.html\" style=\"color: rgba(6,27,91,0.62); text-decoration: none;\">Privacy<\u002Fa>\n        <a href=\"mailto:support@pickie.app\" style=\"color: rgba(6,27,91,0.62); text-decoration: none;\">Contact<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"font-size: 12.5px; color: rgba(6,27,91,0.4);\">© 2026 Pickie · pickie.app<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const sections = [\n      { n: 1, title: 'Introduction', paras: [\n        'This Privacy Policy explains how Pickie collects, uses, stores, shares, and protects your personal data when you use our app, website, and related services.',\n        'By using Pickie, you understand that we process your personal data as described in this Privacy Policy. This Privacy Policy also serves as a Privacy Notice under Indonesian Law No. 27/2022. By registering, accessing or using Pickie, users acknowledge they have read and understood this Privacy Policy and, where consent is required by law, expressly consent to the collection, use, storage, disclosure, transfer and other processing of their personal data.',\n      ] },\n      { n: 2, title: 'Personal Data We Collect', paras: [\n        'We collect personal data directly from users, automatically through use of the Platform, and where permitted by law, from third parties such as login providers. Users are responsible for ensuring the accuracy of the personal data they provide. We may collect the following types of data:',\n      ], subs: [\n        { t: '2.1 Account Data', bullets: ['Name', 'Email address', 'Login method', 'User ID', 'Password or authentication credential, where applicable', 'Account status', 'Account creation date'] },\n        { t: '2.2 Profile Data', bullets: ['Profile photo', 'Bio', 'Gender', 'Date of birth or age', 'Country and city', 'Preferred play area', 'Skill level', 'Playing style', 'Looking-for preferences', 'Sports interests'] },\n        { t: '2.3 Location Data', paras: ['We may collect location data when you use location-based features, such as discover, nearby matching, match now, QR matching, or radius filtering. This may include:'], bullets: ['Approximate location', 'Current location while using the app', 'Preferred play city or area'], note: 'You can control location permission through your device settings.' },\n        { t: '2.4 Match and Interaction Data', bullets: ['Likes', 'Passes', 'Matches', 'QR match activity', 'Nearby match activity', 'Blocked users', 'Reported users', 'Chat metadata', 'Match preferences'] },\n        { t: '2.5 Chat and User Content', paras: ['We may process messages, photos, reports, and content you submit in the app.', 'We may review content when needed for safety, moderation, abuse handling, legal compliance, or support.'] },\n        { t: '2.6 Device and Technical Data', bullets: ['Device type', 'Operating system', 'App version', 'IP address', 'Device identifiers', 'Crash logs', 'Performance logs', 'Security logs'] },\n        { t: '2.7 Payment Data', paras: ['If Pickie offers paid features in the future, payment may be processed through Apple, Google, or other payment providers. Pickie may receive limited purchase-related information, such as subscription status, transaction reference, and product purchased.', 'We do not store full credit card details unless explicitly stated and handled by a compliant payment provider.'] },\n        { t: '2.8 Support and Communication Data', paras: ['When you contact us, we may collect your email, message, support request, screenshots, and related information needed to respond.'] },\n      ] },\n      { n: 3, title: 'How We Use Your Data', paras: ['We use your data to:'], bullets: [\n        'Create and manage your account.',\n        'Show your profile to relevant users.',\n        'Recommend players and potential matches.',\n        'Enable swipe, match, QR match, nearby detection, and chat.',\n        'Provide safety, block, and report features.',\n        'Prevent fraud, spam, abuse, fake accounts, and harmful activity.',\n        'Send notifications, reminders, updates, and service messages.',\n        'Improve app performance, analytics, and user experience.',\n        'Provide customer support.',\n        'Process purchases or subscriptions, if applicable.',\n        'Comply with legal obligations.',\n        'Enforce our Terms of Service, including platform administration, fraud prevention, legal claims, dispute resolution, compliance, internal audit, business operations and service improvement.',\n      ] },\n      { n: 4, title: 'Data Shown to Other Users', paras: ['Some information is visible to other users, such as:'], bullets: [\n        'Name or display name', 'Profile photo', 'Age or age range', 'Gender, if shown in the app', 'City or preferred play area', 'Skill level', 'Playing style', 'Bio', 'Match status', 'Other profile information you choose to display',\n      ], note: 'You should not include sensitive personal information in your profile or chat unless you are comfortable sharing it.' },\n      { n: 5, title: 'How We Share Data', subs: [\n        { t: '5.1 With Other Users', paras: ['We share profile and matching information as needed to operate Pickie.'] },\n        { t: '5.2 With Service Providers', paras: ['We may use trusted service providers for hosting, database, authentication, analytics, crash reporting, push notifications, payments, customer support, and security.', 'Examples may include services such as Supabase, Firebase, Apple, Google, analytics tools, hosting providers, or email services.'] },\n        { t: '5.3 For Safety and Legal Reasons', paras: ['We may disclose data if needed to:'], bullets: ['Comply with law or legal process.', 'Protect user safety.', 'Investigate fraud, abuse, or security issues.', 'Enforce our Terms.', 'Protect Pickie\\u2019s rights, property, and community.'] },\n        { t: '5.4 Business Transfer', paras: ['If Pickie is involved in a merger, acquisition, financing, restructuring, sale of assets, or similar business transaction, user data may be transferred as part of that transaction, subject to applicable law.'] },\n        { t: '5.5 No Sale of Personal Data', paras: ['We do not sell your personal data.', 'If we work with partners, events, clubs, or brands in the future, we will only share personal data with clear disclosure and consent where required. We may also share personal data with affiliates, professional advisers, regulators and law enforcement where required by law.'] },\n      ] },\n      { n: 6, title: 'Legal Basis for Processing', paras: ['Depending on the applicable law, we process personal data based on:'], bullets: [\n        'Your consent.',\n        'Performance of our agreement with you.',\n        'Compliance with legal obligations.',\n        'Protection of vital interests or safety.',\n        'Legitimate business interests, balanced with your rights.',\n        'Other lawful bases permitted by applicable law, including other lawful grounds recognized under UU PDP.',\n      ] },\n      { n: 7, title: 'Data Retention', paras: [\n        'We keep your personal data for as long as needed to provide Pickie, maintain your account, comply with legal obligations, resolve disputes, prevent fraud, and enforce our Terms.',\n        'If you delete your account, we will delete or anonymize your personal data unless retention is required for legal, security, fraud prevention, dispute resolution, or legitimate business reasons.',\n        'Aggregated or anonymized data may be retained because it does not directly identify you. After expiry, data will be deleted, anonymized or otherwise disposed of in accordance with applicable law unless retention is legally required.',\n      ] },\n      { n: 8, title: 'Account Deletion', paras: [\n        'You may request account deletion through the app or by contacting support@pickie.app.',\n        'When your account is deleted:',\n      ], bullets: [\n        'Your public profile will no longer be visible.',\n        'Your personal account data will be deleted or anonymized.',\n        'Some data may be retained where legally or operationally necessary.',\n        'Messages already sent to other users may remain visible to them unless deletion is technically and legally required.',\n        'Reports, safety logs, and abuse-prevention records may be retained for community protection.',\n      ] },\n      { n: 9, title: 'Your Privacy Rights', paras: ['Depending on your location and applicable law, you may have the right to:'], bullets: [\n        'Request information about how your data is processed.',\n        'Access a copy of your personal data.',\n        'Correct inaccurate data.',\n        'Delete your personal data.',\n        'Withdraw consent.',\n        'Restrict or object to certain processing.',\n        'Request data portability.',\n        'Object to certain automated decisions or profiling.',\n        'File a complaint with the relevant authority.',\n      ], note: 'Users may also withdraw consent at any time where processing is based on consent, without affecting processing already lawfully carried out. Certain requests may be limited where permitted by law. To exercise your rights, contact us at support@pickie.app.' },\n      { n: 10, title: 'Children\\u2019s Privacy', paras: [\n        'Pickie is intended for users aged 18 and above.',\n        'We do not knowingly collect personal data from users under 18. If we learn that an underage user has created an account, we may delete or restrict the account.',\n        'If Pickie later allows minors, we must create a separate child-safety and parental-consent flow.',\n      ] },\n      { n: 11, title: 'Location Privacy', paras: [\n        'Pickie uses location to help users find nearby players and relevant matches.',\n        'Pickie follows these location privacy principles:',\n      ], bullets: [\n        'Use precise current location only when the user activates location-based features.',\n        'Do not collect background location unless absolutely necessary.',\n        'Do not show exact live location to other users.',\n        'Show approximate location, city, or distance range instead.',\n        'Allow users to disable location permission.',\n      ] },\n      { n: 12, title: 'Security', paras: [\n        'We use reasonable technical and organizational measures to protect personal data, such as encryption, access control, authentication, monitoring, and secure infrastructure.',\n        'However, no app, website, or internet transmission is 100% secure.',\n        'If a personal data breach occurs, Pickie will take appropriate steps according to applicable law.',\n      ] },\n      { n: 13, title: 'International Data Transfer', paras: [\n        'Pickie may use service providers located outside your country. When data is transferred internationally, we will take reasonable steps to protect it according to applicable law. Pickie will implement safeguards required under applicable law before cross-border transfers.',\n      ] },\n      { n: 14, title: 'Third-Party Services', paras: [\n        'Pickie may contain links, integrations, login services, SDKs, or tools provided by third parties. Their privacy practices are governed by their own policies.',\n        'Examples may include:',\n      ], bullets: ['Google login', 'Apple login', 'Firebase', 'Supabase', 'Analytics tools', 'Payment providers', 'Push notification providers'] },\n      { n: 15, title: 'Push Notifications and Communications', paras: [\n        'We may send push notifications, service updates, safety messages, match alerts, chat alerts, and promotional messages.',\n        'You can control push notifications through your device settings.',\n      ] },\n      { n: 16, title: 'Role of Pickie as Data Controller', paras: [\n        'Pickie acts as the controller of users\\u2019 personal data and may appoint processors to process personal data on its behalf subject to confidentiality and security obligations.',\n      ] },\n      { n: 17, title: 'Changes to This Privacy Policy', paras: [\n        'We may update this Privacy Policy from time to time. If changes are material, we may notify you through the app, email, or another reasonable method.',\n        'Continued use after the effective date constitutes acceptance of the updated Privacy Policy to the extent permitted by applicable law.',\n      ] },\n      { n: 18, title: 'Contact Us', paras: [\n        'For privacy questions, data requests, deletion requests, or complaints, contact us at support@pickie.app.',\n      ] },\n    ];\n    return { sections };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
