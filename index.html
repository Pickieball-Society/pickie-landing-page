document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"max-width: 1180px; margin: 0 auto; padding: 0 28px 80px;\">\n    <div class=\"pk-reveal\" style=\"text-align: center; max-width: 640px; margin: 0 auto 44px;\">\n      <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: #1488FF; margin-bottom: 12px;\">BEYOND THE SWIPE<\u002Fdiv>\n      <h2 style=\"font-size: clamp(30px, 4vw, 46px); line-height: 1.04; letter-spacing: -0.03em; font-weight: 800; text-wrap: balance;\">Built for the whole match.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px;\">\n      <sc-for list=\"{{ feats }}\" as=\"feat\" hint-placeholder-count=\"4\">\n        <div class=\"pk-reveal\" style=\"background: #fff; border-radius: 20px; padding: 26px 24px; border: 1px solid rgba(6,27,91,0.06);\" style-hover=\"transform: translateY(-5px); box-shadow: 0 20px 40px -22px rgba(6,27,91,0.3);\">\n          <div style=\"width: 46px; height: 46px; border-radius: 13px; background: rgba(20,136,255,0.1); display: flex; align-items: center; justify-content: center; color: #1488FF; margin-bottom: 18px;\">{{ feat.icon }}<\u002Fdiv>\n          <div style=\"font-size: 17px; font-weight: 800; letter-spacing: -0.02em;\">{{ feat.title }}<\u002Fdiv>\n          <p style=\"font-size: 13.5px; line-height: 1.55; color: rgba(6,27,91,0.62); margin-top: 8px;\">{{ feat.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOUNDER STORY ============ -->\n  <section id=\"founder\" style=\"max-width: 1180px; margin: 0 auto; padding: 0 28px 80px;\">\n    <div style=\"background: #fff; border: 1px solid rgba(6,27,91,0.06); border-radius: 32px; padding: clamp(32px, 5vw, 60px); display: grid; grid-template-columns: 0.8fr 1.2fr; gap: clamp(32px, 4vw, 60px); align-items: center;\">\n      <!-- photo -->\n      <div>\n        <div style=\"position: relative;\">\n          <div style=\"position: absolute; inset: 14px -14px -14px 14px; background: #AFFF00; border-radius: 28px; transform: rotate(-2deg);\"><\u002Fdiv>\n          <div style=\"position: relative; width: 100%; aspect-ratio: 4 / 5;\">\n            <img src=\"34329286-2940-4aef-9f18-54d338f15ef3\" alt=\"Kevin Kennedy Kie playing pickleball\" style=\"position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 24px;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 12px; margin-top: 28px;\">\n          <span style=\"width: 10px; height: 10px; border-radius: 50%; background: #AFFF00; border: 2px solid #061B5B;\"><\u002Fspan>\n          <div>\n            <div style=\"font-family: 'Sora'; font-weight: 800; font-size: 18px; letter-spacing: -0.02em;\">Kevin Kennedy Kie<\u002Fdiv>\n            <div style=\"font-size: 13px; color: rgba(6,27,91,0.55);\">Founder, Pickie<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- story -->\n      <div>\n        <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: #1488FF; margin-bottom: 12px;\">FROM THE FOUNDER<\u002Fdiv>\n        <h2 style=\"font-size: clamp(28px, 3.6vw, 42px); line-height: 1.06; letter-spacing: -0.03em; font-weight: 800; text-wrap: balance;\">Why I built Pickie.<\u002Fh2>\n        <div style=\"display: flex; flex-direction: column; gap: 14px; margin-top: 20px; font-size: 16px; line-height: 1.65; color: rgba(6,27,91,0.68);\">\n          <p>I hit my first pickleball in August 2024 in Ho Chi Minh City — a friend brought me along. I was hooked before the first game ended.<\u002Fp>\n          <p>Since then I've played tournaments across cities and countries, and partnered with more players than I can count. The same struggle followed me everywhere: finding a partner you truly click with is hard. Not just a similar level — real chemistry, the kind that makes a game flow.<\u002Fp>\n          <p>So I turned everything those matches taught me into Pickie's chemistry algorithm — for players who want more partners that fit, and for those just starting out. Whether you play for the social side, for tournaments, or just for fun, Pickie helps you connect with the people who fit your game.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: inline-block; background: #AFFF00; color: #061B5B; border-radius: 18px 18px 18px 4px; padding: 18px 22px; margin-top: 24px;\">\n          <div style=\"font-family: 'Sora'; font-weight: 800; font-size: clamp(16px, 1.6vw, 19px); line-height: 1.4; letter-spacing: -0.01em; text-wrap: balance;\">\"Pickleball must be fun. Playing with people is fun — playing with the right people, with the right chemistry, is even more fun.\"<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size: 14.5px; line-height: 1.6; color: rgba(6,27,91,0.55); margin-top: 20px;\">Kevin's hope is bigger than an app: to help pickleball grow — in Indonesia, in Vietnam, across Southeast Asia, and beyond.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FINAL CTA ============ -->\n  <section id=\"get\" style=\"max-width: 1180px; margin: 0 auto; padding: 0 28px 80px;\">\n    <div style=\"background: linear-gradient(150deg, #0a2570, #061B5B 55%, #04123D); border-radius: 32px; padding: clamp(44px, 6vw, 76px) clamp(28px, 5vw, 60px); text-align: center; position: relative; overflow: hidden;\">\n      <div style=\"position: absolute; bottom: -80px; left: -40px; width: 320px; height: 320px; border-radius: 50%; background: radial-gradient(circle, rgba(175,255,0,0.22), transparent 70%); animation: pkDrift1 18s ease-in-out infinite; will-change: transform;\"><\u002Fdiv>\n      <div style=\"position: absolute; top: -100px; right: -20px; width: 340px; height: 340px; border-radius: 50%; background: radial-gradient(circle, rgba(20,136,255,0.30), transparent 70%); animation: pkDrift2 22s ease-in-out infinite; will-change: transform;\"><\u002Fdiv>\n      <div c
